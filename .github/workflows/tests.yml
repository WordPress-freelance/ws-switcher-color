name: tests

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  unit:
    name: Unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Composer install
        run: composer install --no-progress --prefer-dist

      - name: PHP syntax lint
        run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l > /dev/null

      - name: PHPUnit (unit)
        run: vendor/bin/phpunit -c phpunit.xml

  integration:
    name: BDD integration (WordPress + MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_test
        ports: [ '3306:3306' ]
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli
          tools: composer:v2, wp-cli

      - name: Install Subversion (required by install-wp-tests.sh)
        run: sudo apt-get update && sudo apt-get install -y subversion default-mysql-client

      - name: Install WP test suite + WP core
        run: bash bin/install-wp-tests.sh wp_test root root 127.0.0.1:3306 latest true

      - name: Composer install
        run: composer install --no-progress --prefer-dist

      - name: PHPUnit (integration)
        run: vendor/bin/phpunit -c phpunit-integration.xml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: xdebug
          tools: composer:v2

      - name: Composer install
        run: composer install --no-progress --prefer-dist

      - name: PHPUnit coverage
        run: vendor/bin/phpunit -c phpunit.xml --coverage-clover clover.xml

      - uses: codecov/codecov-action@v4
        with:
          files: clover.xml
          fail_ci_if_error: false
